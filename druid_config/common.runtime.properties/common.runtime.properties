
druid.extensions.loadList=["druid-histogram","druid-datasketches","druid-lookups-cached-global","postgresql-metadata-storage","druid-parquet-extensions","druid-avro-extensions"]
# ZooKeeper
druid.zk.service.host=zookeeper
druid.zk.paths.base=/druid
# Metadata storage (PostgreSQL)
druid.metadata.storage.type=postgresql
druid.metadata.storage.connector.connectURI=jdbc:postgresql://postgres:5432/metadata
druid.metadata.storage.connector.user=druid
druid.metadata.storage.connector.password=Password
# Deep storage (Stockage local des segments indexés)
druid.storage.type=local
druid.storage.storageDirectory=/opt/druid/var/druid/segments
# Indexing logs (Logs des tâches d'ingestion)
druid.indexer.logs.type=file
druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs
# Télémétrie désactivée pour économiser les ressources
druid.emitter=noop