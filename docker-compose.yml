services:
  postgres:
    image: postgres:15-alpine
    container_name: druid-postgres
    networks:
      - data-stack
    environment:
      - POSTGRES_PASSWORD=Password
      - POSTGRES_USER=druid
      - POSTGRES_DB=metadata
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "druid", "-d", "metadata" ]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  zookeeper:
    image: zookeeper:3.8
    container_name: druid-zookeeper
    networks:
      - data-stack
    environment:
      - JVMFLAGS=-Xms64m -Xmx128m
    healthcheck:
      test: [ "CMD", "zkServer.sh", "status" ]
      interval: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M

  druid:
    image: apache/druid:28.0.1
    container_name: druid
    user: root
    networks:
      - data-stack
    environment:
      - JAVA_OPTS=-Xms768m -Xmx768m
      - DRUID_LOG_LEVEL=error
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper: { condition: service_healthy }
    ports:
      - "8888:8888"
      - "8081:8081"
      - "8082:8082"
    configs:
      - source: druid_common_config
        target: /opt/druid/conf/druid/single-server/micro-quickstart/_common/common.runtime.properties
    entrypoint: [ "/bin/bash", "/opt/druid/start-druid.sh" ]
    volumes:
      - ./src/data:/opt/druid/var/druid/data
      - ./start-druid.sh:/opt/druid/start-druid.sh
      - druid_segments:/opt/druid/var/druid/segments
      - druid_indexing_logs:/opt/druid/var/druid/indexing-logs
    deploy:
      resources:
        limits:
          memory: 3000M

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    networks:
      - data-stack
    environment:
      - SUPERSET_SECRET_KEY=votre_cle_secrete_123
      - SQLALCHEMY_DATABASE_URI=postgresql://druid:Password@postgres:5432/superset
    ports:
      - "8088:8088"
    depends_on:
      postgres: { condition: service_healthy }
      druid: { condition: service_started }
    profiles:
      - viz
    deploy:
      resources:
        limits:
          memory: 1024M

  airflow:
    image: apache/airflow:2.7.1-python3.11
    container_name: airflow
    user: root
    networks:
      - data-stack
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://druid:Password@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=ma_super_cle_secrete_987
      - AIRFLOW__CORE__KILLED_TASK_CLEANUP_TIME=60
      - AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT=120
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=60
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=30
      - AIRFLOW__SCHEDULER__TASK_ZOMBIE_DETECTION_THRESHOLD=600
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _AIRFLOW_WWW_USER_ROLE=Admin
    command: standalone
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src/data:/src/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 2000M

configs:
  druid_common_config:
    content: |
      druid.extensions.loadList=["druid-histogram","druid-datasketches","druid-lookups-cached-global","postgresql-metadata-storage","druid-parquet-extensions"]
      druid.zk.service.host=zookeeper
      druid.zk.paths.base=/druid
      druid.metadata.storage.type=postgresql
      druid.metadata.storage.connector.connectURI=jdbc:postgresql://postgres:5432/metadata
      druid.metadata.storage.connector.user=druid
      druid.metadata.storage.connector.password=Password
      druid.storage.type=local
      druid.storage.storageDirectory=/opt/druid/var/druid/segments
      druid.indexer.logs.type=file
      druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs
      druid.emitter=noop
      druid.server.http.numThreads=6
      druid.processing.buffer.sizeBytes=67108864
      druid.processing.numThreads=1

networks:
  data-stack:
    driver: bridge

volumes:
  druid_metadata:
  druid_segments:
  druid_indexing_logs:
