services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: druid-postgres
    environment:
      - POSTGRES_PASSWORD=Password
      - POSTGRES_USER=druid
      - POSTGRES_DB=metadata
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "druid", "-d", "metadata"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: zookeeper:3.8
    container_name: druid-zookeeper
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 5s
      retries: 10

  # --- DATA ENGINE (DRUID) ---
  druid:
    image: apache/druid:28.0.1
    container_name: druid
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper: { condition: service_healthy }
    ports:
      - "8888:8888"
    volumes:
      - ./src/data:/opt/druid/var/druid/data
      - ./common.runtime.properties:/opt/druid/conf/druid/single-server/micro-quickstart/_common/common.runtime.properties

  # --- VISUALIZATION (SUPERSET) ---
  superset:
    image: apache/superset:latest
    container_name: superset
    environment:
      - SUPERSET_SECRET_KEY=votre_cle_secrete_123
      - SQLALCHEMY_DATABASE_URI=postgresql://druid:Password@postgres:5432/superset
    ports:
      - "8088:8088"
    depends_on:
      postgres: { condition: service_healthy }

  # --- ORCHESTRATION (AIRFLOW) ---
  airflow:
    image: apache/airflow:2.7.1-python3.11
    container_name: airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://druid:Password@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock # Pour que Airflow lance l'image 'immobilier-app'
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  druid_metadata: