name: Python Code Quality Checks

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  code_quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black  ruff nbqa

      - name: Fix imports and lint with ruff
        run: |
          ruff check . --select I --fix --ignore E999
          ruff check . --fix --ignore E999

      - name: Format notebooks with nbqa
        run: |
          nbqa ruff . --select I --fix --ignore E999
          nbqa black . || true

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with black and ruff"
          file_pattern: "*.py *.ipynb"